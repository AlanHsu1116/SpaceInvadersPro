<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris PRO - Arcade Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_tetris.css">
</head>
<body>
    <div id="gameWrapper">
        <div id="top-controls">
            <button id="backToMenuBtn" onclick="window.location.href='index.html'">← 主選單</button>
            <div class="game-title-small">TETRIS PRO</div>
            <div class="top-right-btns">
                <button id="bgmBtn" class="control-btn">🔇 音樂: 關</button>
            </div>
        </div>
        
        <div id="gameLayout">
            <!-- Left Side: Stats -->
            <div id="sidePanelLeft" class="side-panel">
                <div class="stat-box">
                    <div class="label">SCORE</div>
                    <div id="scoreDisplay">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">LEVEL</div>
                    <div id="levelDisplay">1</div>
                </div>
            </div>

            <!-- Center: Game Canvas -->
            <div id="canvasContainer">
                <canvas id="gameCanvas" width="320" height="768"></canvas>
            </div>

            <!-- Right Side: Next Piece -->
            <div id="sidePanelRight" class="side-panel">
                <div class="stat-box next-box">
                    <div class="label">NEXT</div>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
                
                <div class="stat-box">
                    <div class="label">LINES</div>
                    <div id="linesDisplay">0</div>
                </div>
            </div>
        </div>

        <!-- Mobile Controls (Ergonomic Layout) -->
        <div id="mobileControls" class="hidden">
            <div class="m-group-left">
                <button id="moveLeftBtn" class="arrow-btn">◀</button>
                <button id="moveRightBtn" class="arrow-btn">▶</button>
            </div>
            <div class="m-group-right">
                <button id="rotateBtn" class="ab-btn">A</button>
                <button id="hardDropBtn" class="ab-btn">B</button>
            </div>
        </div>

        <!-- Overlays -->
        <div id="startScreen" class="overlay">
            <h1 class="neon-text">TETRIS PRO</h1>
            <p class="subtitle">RETRO NEON EDITION</p>
            <div class="menu-btns">
                <button id="startBtn" class="play-btn">START GAME</button>
                <button id="leaderboardBtn" class="play-btn">LEADERBOARD</button>
            </div>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1 class="danger-text">GAME OVER</h1>
            <div class="final-stats">
                <p>Score: <span id="finalScore">0</span></p>
                <p>Level: <span id="finalLevel">1</span></p>
                <p>Lines: <span id="finalLines">0</span></p>
            </div>
            <div id="highScoreInput" class="hidden">
                <p class="neon-text-small">NEW HIGH SCORE!</p>
                <input type="text" id="playerNameInput" maxlength="10" placeholder="ENTER NAME">
                <button id="saveScoreBtn" class="play-btn">SAVE RECORD</button>
            </div>
            <button id="restartBtn" class="play-btn">TRY AGAIN</button>
        </div>

        <div id="leaderboardScreen" class="overlay hidden">
            <h1 class="neon-text">TOP SCORES</h1>
            <div id="leaderboardList">
                <!-- Scores will be injected here -->
            </div>
            <button id="closeLeaderboardBtn" class="play-btn">BACK</button>
        </div>

        <div id="pauseScreen" class="overlay hidden">
            <h1 class="neon-text">PAUSED</h1>
            <button id="resumeBtn" class="play-btn">RESUME</button>
        </div>

        <!-- Scanline Effect -->
        <div class="scanline"></div>
    </div>

    <!-- Hidden audio elements if needed, or use Web Audio API in script -->
    <audio id="bgm" src="Feel-Good.mp3" loop></audio>

    <script src="script_tetris.js"></script>
</body>
</html>
